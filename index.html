<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>卜晓红饮食小助手</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:"PingFang SC","Microsoft YaHei",sans-serif;
      background:#f5f5f0;
      color:#222;
      font-size:18px;
      line-height:1.8;
    }
    .header{background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;padding:18px;text-align:center;}
    .header h1{font-size:24px;margin-bottom:6px;}
    .header p{font-size:14px;opacity:.95;}
    .badges{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .badge{font-size:12px;padding:4px 10px;border-radius:14px;background:rgba(255,255,255,.2);}
    .tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid #e8f5e9;}
    .tab{
      flex:1;
      min-width:90px;
      padding:12px 8px;
      text-align:center;
      font-size:16px;
      border:none;
      background:none;
      cursor:pointer;
      color:#444;
    }
    .tab.active{color:#2d6a4f;border-bottom:3px solid #2d6a4f;font-weight:bold;}
    .content{padding:16px 16px;}
    .hidden{display:none;}

    .search-box{padding:10px 14px;background:#fff;border-bottom:1px solid #eee;}
    .search-input{width:100%;padding:10px 14px;border:1.5px solid #c8e6c9;border-radius:24px;font-size:16px;}
    .search-input:focus{outline:none;border-color:#40916c;}

    .legend{display:flex;gap:10px;margin:8px 0 10px;}
    .legend-item{font-size:12px;color:#555;display:flex;align-items:center;gap:4px;}
    .dot{width:10px;height:10px;border-radius:50%;}
    .dot-ok{background:#40916c;}
    .dot-warn{background:#f59e0b;}
    .dot-no{background:#ef4444;}

    .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
    .chip{border:none;padding:5px 12px;border-radius:18px;font-size:13px;cursor:pointer;background:#e8f5e9;color:#2d6a4f;}
    .chip.active{background:#2d6a4f;color:#fff;}

    .food-list{display:flex;flex-direction:column;gap:10px;}
    .card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:5px solid #ccc;}
    .card.ok{border-left-color:#40916c;}
    .card.warn{border-left-color:#f59e0b;}
    .card.no{border-left-color:#ef4444;}
    .card-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
    .name{font-size:18px;font-weight:bold;}
    .eng{font-size:13px;color:#666;margin-left:6px;}
    .status{font-size:22px;}
    .tcm{font-size:13px;color:#5a8a6a;background:#f0faf4;padding:4px 9px;border-radius:9px;display:inline-block;margin-bottom:6px;}
    .detail{font-size:15px;color:#222;line-height:1.9;}
    .tags{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;}
    .tag{font-size:12px;padding:3px 8px;border-radius:10px;}
    .tag-diabetes{background:#fef3c7;color:#92400e;}
    .tag-liver{background:#d1fae5;color:#065f46;}
    .tag-kidney{background:#dbeafe;color:#1e40af;}
    .tag-lung{background:#f3e8ff;color:#5b21b6;}
    .note{font-size:13px;color:#78350f;background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:6px 10px;margin-top:6px;}

    .section-title{font-size:15px;color:#666;margin:8px 0;font-weight:600;}
    .meal-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:10px;}
    .meal-head{font-size:16px;font-weight:bold;color:#2d6a4f;margin-bottom:6px;}
    .meal-line{font-size:15px;color:#222;border-top:1px dashed #e5e7eb;padding:5px 0;line-height:1.9;}

    .forbid-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:12px;border-left:5px solid #ef4444;}
    .forbid-title{font-size:16px;color:#b91c1c;font-weight:bold;margin-bottom:8px;}
    .forbid-tags{display:flex;flex-wrap:wrap;gap:8px;}
    .f-tag{background:#fee2e2;color:#991b1b;font-size:14px;padding:5px 11px;border-radius:18px;}
    .limit-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:5px solid #f59e0b;}
    .limit-title{font-size:16px;color:#92400e;font-weight:bold;margin-bottom:6px;}
    .limit-line{font-size:15px;color:#222;border-top:1px solid #fef3c7;padding:6px 0;}

    .tip-box{background:#f0fdf4;border-radius:10px;padding:10px 12px;border:1px solid #bbf7d0;font-size:14px;color:#166534;margin-top:10px;}
    
    .day-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;}
    .day-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid #cbd5e1;background:#fff;font-size:14px;cursor:pointer;color:#475569;}
    .day-btn.active{background:#2d6a4f;color:#fff;border-color:#2d6a4f;}
  </style>
</head>
<body>
  <div class="header">
    <h1>卜晓红饮食小助手</h1>
    <p>控血糖 · 护脂肪肝 · 护肾结石 · 润肺结节</p>
    <div class="badges">
      <span class="badge">🩸 控糖</span>
      <span class="badge">🫀 护肝</span>
      <span class="badge">💧 护肾</span>
      <span class="badge">🫁 润肺</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('food')" id="tab-food">🥬 食材</button>
    <button class="tab" onclick="showTab('menu')" id="tab-menu">📅 菜谱</button>
    <button class="tab" onclick="showTab('forbid')" id="tab-forbid">🚫 禁食</button>
  </div>

  <div id="page-food">
    <div class="search-box"><input class="search-input" id="search" placeholder="搜索食材..." oninput="renderFoods()"></div>
    <div class="content">
      <div class="legend">
        <div class="legend-item"><span class="dot dot-ok"></span>推荐</div>
        <div class="legend-item"><span class="dot dot-warn"></span>少量</div>
        <div class="legend-item"><span class="dot dot-no"></span>避免</div>
      </div>
      <div class="chip-row" id="cat-row"></div>
      <div class="food-list" id="food-list"></div>
    </div>
  </div>

  <div id="page-menu" class="hidden">
    <div class="content">
      <div class="day-tabs" id="day-tabs"></div>
      <div id="meal-box"></div>
    </div>
  </div>

  <div id="page-forbid" class="hidden">
    <div class="content">
      <div class="forbid-card">
        <div class="forbid-title">❌ 完全不能吃</div>
        <div class="forbid-tags">
          <span class="f-tag">甜品饮料</span><span class="f-tag">油炸食物</span><span class="f-tag">腌制加工</span>
          <span class="f-tag">动物内脏</span><span class="f-tag">辛辣烧烤</span><span class="f-tag">酒类</span>
        </div>
      </div>
      <div class="limit-card">
        <div class="limit-title">⚠️ 严格控制</div>
        <div class="limit-line">🍚 白米饭：必须混糙米，每餐半碗</div>
        <div class="limit-line">🎃 南瓜/土豆：当主食吃，不当菜吃</div>
        <div class="limit-line">🥣 白粥：升糖太快，建议改杂粮粥</div>
      </div>
    </div>
  </div>

<script>
  const foods = [
    {name:"小白菜",eng:"Bok Choy",cat:"蔬菜",status:"ok",tcm:"性凉·甘",benefit:"清热润肠，适合天天吃。",tags:["liver","lung"],tip:"清炒少油。"},
    {name:"菜心",eng:"Chye Sim",cat:"蔬菜",status:"ok",tcm:"性凉·甘",benefit:"护肝排毒，适合脂肪肝。",tags:["liver"],tip:"大火快炒。"},
    {name:"苦瓜",eng:"Bitter Gourd",cat:"蔬菜",status:"ok",tcm:"性寒·苦",benefit:"含苦瓜苷，帮助降血糖。",tags:["diabetes","liver"],tip:"一周2-3次。"},
    {name:"冬瓜",eng:"Winter Melon",cat:"蔬菜",status:"ok",tcm:"性微寒",benefit:"利尿，护肾，防结石。",tags:["kidney"],tip:"冬瓜薏米汤极好。"},
    {name:"山药",eng:"Yam",cat:"主食",status:"ok",tcm:"性平·甘",benefit:"健脾补肾，辅助控糖。",tags:["diabetes","kidney"],tip:"蒸着代替米饭。"},
    {name:"燕麦",eng:"Oats",cat:"主食",status:"ok",tcm:"性平·甘",benefit:"高纤维，降脂控糖。",tags:["diabetes","liver"],tip:"早餐首选。"},
    {name:"黑巧克力",eng:"Dark Chocolate",cat:"零食",status:"warn",tcm:"性微温",benefit:"抗氧化，对护肝有益。",tags:["liver"],tip:"需≥70%可可，每天2块。"}
  ];
  const week = [
    {day:"周一",breakfast:["燕麦粥","蛋","苹果"],lunch:["蒸鱼","炒菜心","冬瓜汤"],dinner:["番茄豆腐","小米粥"]},
    {day:"周二",breakfast:["小米粥","蛋","梨"],lunch:["蒸三文鱼","西兰花","冬瓜汤"],dinner:["山药木耳","燕麦粥"]}
  ];
  let currentCat = "全部";
  let currentDay = 0;
  function showTab(n){
    ["food","menu","forbid"].forEach(t=>{
      document.getElementById("page-"+t).classList.add("hidden");
      document.getElementById("tab-"+t).classList.remove("active");
    });
    document.getElementById("page-"+n).classList.remove("hidden");
    document.getElementById("tab-"+n).classList.add("active");
  }
  function renderFoods(){
    const list = document.getElementById("food-list");
    const q = document.getElementById("search").value.trim();
    list.innerHTML = "";
    foods.filter(f=>(currentCat==="全部"||f.cat===currentCat)&&(f.name.includes(q))).forEach(f=>{
      const div = document.createElement("div");
      div.className = "card "+f.status;
      div.innerHTML = `<div class="card-title"><b>${f.name}</b><span>${f.status==="ok"?"✅":"⚠️"}</span></div><div class="tcm">${f.tcm}</div><div class="detail">${f.benefit}</div>`;
      list.appendChild(div);
    });
  }
  function renderDayTabs(){
    const row = document.getElementById("day-tabs");
    row.innerHTML = "";
    week.forEach((d,i)=>{
      const btn = document.createElement("button");
      btn.className = "day-btn"+(i===currentDay?" active":"");
      btn.textContent = d.day;
      btn.onclick = ()=>{currentDay=i;renderDayTabs();renderMeal();};
      row.appendChild(btn);
    });
  }
  function renderMeal(){
    const box = document.getElementById("meal-box");
    const d = week[currentDay];
    box.innerHTML = `<div class="meal-card"><b>🌅 早餐</b><br>${d.breakfast.join("<br>")}</div><div class="meal-card"><b>☀️ 午餐</b><br>${d.lunch.join("<br>")}</div><div class="meal-card"><b>🌙 晚餐</b><br>${d.dinner.join("<br>")}</div>`;
  }
  renderFoods();renderDayTabs();renderMeal();
</script>
</body>
</html>
